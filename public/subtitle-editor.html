<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Subtitle Timeline Editor</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0a0b0f; color: #eee; font-family: 'Inter', -apple-system, sans-serif; overflow-x: hidden; }

  .toolbar {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    background: #12141a; border-bottom: 1px solid #222; padding: 10px 20px;
    display: flex; align-items: center; gap: 14;
  }
  .toolbar button {
    padding: 8px 16px; border-radius: 8px; border: 1px solid #333; background: #1a1c24;
    color: #eee; cursor: pointer; font-size: 13px; font-weight: 600;
  }
  .toolbar button:hover { background: #252830; }
  .toolbar button.active { background: #D4A843; color: #000; border-color: #D4A843; }
  .toolbar .time { font-size: 14px; font-weight: 700; color: #D4A843; min-width: 120px; }
  .toolbar .frame { font-size: 12px; color: #888; }

  .timeline-container {
    margin-top: 60px; padding: 20px; overflow-x: auto;
  }

  .waveform-area {
    position: relative; height: 60px; background: #111318; border-radius: 8px;
    margin-bottom: 8px; cursor: pointer; border: 1px solid #1a1c24;
  }
  .waveform-area canvas { width: 100%; height: 100%; border-radius: 8px; }

  .playhead {
    position: absolute; top: 0; bottom: 0; width: 2px; background: #D4A843;
    pointer-events: none; z-index: 10;
    box-shadow: 0 0 8px rgba(212,168,67,0.4);
  }
  .playhead::after {
    content: ''; position: absolute; top: -4px; left: -5px;
    width: 12px; height: 12px; background: #D4A843; border-radius: 50%;
  }

  .subtitle-track {
    position: relative; height: 50px; background: #111318; border-radius: 8px;
    margin-bottom: 4px; border: 1px solid #1a1c24; overflow: visible;
  }

  .subtitle-block {
    position: absolute; top: 4px; height: 42px; border-radius: 8px;
    background: rgba(212,168,67,0.15); border: 1px solid rgba(212,168,67,0.3);
    cursor: grab; display: flex; align-items: center; padding: 0 10px;
    font-size: 11px; color: #D4A843; overflow: hidden; white-space: nowrap;
    text-overflow: ellipsis; user-select: none; min-width: 20px;
  }
  .subtitle-block:hover { background: rgba(212,168,67,0.25); }
  .subtitle-block.active { border-color: #D4A843; background: rgba(212,168,67,0.3); }
  .subtitle-block.dragging { opacity: 0.7; cursor: grabbing; z-index: 50; }

  .resize-handle {
    position: absolute; top: 0; bottom: 0; width: 8px; cursor: ew-resize; z-index: 5;
  }
  .resize-handle.left { left: 0; }
  .resize-handle.right { right: 0; }
  .resize-handle:hover { background: rgba(212,168,67,0.3); }

  .ruler {
    position: relative; height: 28px; margin-bottom: 4px;
  }
  .ruler span {
    position: absolute; top: 0; font-size: 10px; color: #555;
    transform: translateX(-50%);
  }
  .ruler .tick {
    position: absolute; top: 18px; width: 1px; height: 10px; background: #333;
  }

  .export-panel {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: #12141a; border-top: 1px solid #222; padding: 12px 20px;
    display: flex; align-items: center; gap: 14;
  }
  .export-panel textarea {
    flex: 1; height: 60px; background: #0a0b0f; border: 1px solid #333;
    border-radius: 8px; color: #D4A843; font-family: monospace; font-size: 11px;
    padding: 8px; resize: none;
  }
  .export-panel button {
    padding: 10px 20px; border-radius: 8px; border: none;
    background: #D4A843; color: #000; font-weight: 700; cursor: pointer;
  }

  .preview-subtitle {
    position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%);
    padding: 10px 24px; border-radius: 10px; background: rgba(0,0,0,0.8);
    backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1);
    font-size: 16px; color: #fff; pointer-events: none; z-index: 200;
    max-width: 700px; text-align: center;
    transition: opacity 0.15s;
  }

  .zoom-controls { display: flex; align-items: center; gap: 6; }
  .zoom-controls button { padding: 4px 10px; font-size: 16px; }
</style>
</head>
<body>

<div class="toolbar">
  <button id="playBtn" onclick="togglePlay()">&#9654; Play</button>
  <div class="time" id="timeDisplay">00:00.000</div>
  <div class="frame" id="frameDisplay">Frame: 0</div>
  <div style="flex:1"></div>
  <div class="zoom-controls">
    <button onclick="zoomOut()">-</button>
    <span style="font-size:12px;color:#888" id="zoomLabel">100%</span>
    <button onclick="zoomIn()">+</button>
  </div>
</div>

<div class="timeline-container" id="timelineContainer">
  <div class="ruler" id="ruler"></div>
  <div class="waveform-area" id="waveformArea">
    <canvas id="waveformCanvas"></canvas>
    <div class="playhead" id="playhead" style="left:0"></div>
  </div>
  <div id="subtitleTracks"></div>
</div>

<div class="preview-subtitle" id="previewSubtitle" style="opacity:0"></div>

<div class="export-panel">
  <textarea id="exportCode" readonly></textarea>
  <button onclick="copyExport()">Copy Code</button>
  <button onclick="resetSubs()" style="background:#333;color:#f87171">Reset</button>
</div>

<script>
const FPS = 30;
const AUDIO_START_FRAME = 30;
let pixelsPerFrame = 3;
let audioCtx, audioBuffer, sourceNode;
let isPlaying = false;
let currentFrame = 0;
let animationId;
let playStartTime = 0;
let playStartFrame = 0;

// Initial subtitle data — paste your current data here
let subtitles = [
  { from: 12, to: 62, text: "Welcome to Smart Trading Club." },
  { from: 88, to: 248, text: "In this tutorial, you'll learn how to copy professional gold trading signals automatically." },
  { from: 257, to: 439, text: "Every trade is executed on-chain on Arbitrum, fully transparent and verifiable." },
  { from: 441, to: 479, text: "Let's get started." },
  { from: 489, to: 553, text: "Before we begin, here's what you'll need." },
  { from: 556, to: 668, text: "First, a MetaMask wallet — it's a free browser extension." },
  { from: 671, to: 798, text: "Second, the Arbitrum network, which our site adds automatically." },
  { from: 800, to: 966, text: "Third, some USDC on Arbitrum — that's the stablecoin used for all trades." },
  { from: 968, to: 1151, text: "And finally, a tiny bit of Ethereum for gas fees — about fifty cents is enough for dozens of transactions." },
  { from: 1153, to: 1236, text: "Step one: connect your wallet." },
  { from: 1238, to: 1338, text: "Click the Connect Wallet button in the top right corner." },
  { from: 1341, to: 1509, text: "MetaMask will ask you to confirm the connection. No funds are moved — it's just a handshake." },
  { from: 1510, to: 1679, text: "The site can now see your address and balances. Make sure you're on the Arbitrum One network." },
  { from: 1680, to: 1786, text: "Step two: approve USDC spending." },
  { from: 1786, to: 1960, text: "This is a one-time approval that lets the smart contract use your USDC when copying trades." },
  { from: 1961, to: 2131, text: "Click Approve in the MetaMask popup. This is standard for every DeFi protocol." },
  { from: 2131, to: 2251, text: "Your funds stay in your wallet until a trade is actually copied." },
  { from: 2252, to: 2337, text: "You can revoke this approval at any time." },
  { from: 2338, to: 2426, text: "Step three: enable auto-copy." },
  { from: 2428, to: 2529, text: "Choose how much USDC you want to invest per trade." },
  { from: 2529, to: 2763, text: "When a new signal is posted, the bot automatically executes the trade for you on gTrade, a decentralized exchange." },
  { from: 2763, to: 2971, text: "When the trade closes, your USDC plus any profit — or minus any loss — returns to your wallet automatically." },
  { from: 2971, to: 3037, text: "Now let's look at the results page." },
  { from: 3037, to: 3266, text: "Every trade is recorded on the Arbitrum blockchain. Anyone can verify the results — it's fully transparent." },
  { from: 3286, to: 3427, text: "You can see the total profit and loss, win rate, and complete trade history." },
  { from: 3427, to: 3584, text: "Each signal shows the entry price, take profit, stop loss, and final result." },
  { from: 3584, to: 3647, text: "Here are some important tips." },
  { from: 3648, to: 3848, text: "Remember, trading involves risk — with twenty-five x leverage, even small moves can mean significant losses." },
  { from: 3848, to: 3980, text: "That's why every trade uses a stop-loss to prevent large losses." },
  { from: 3980, to: 4064, text: "Only invest what you can afford to lose." },
  { from: 4064, to: 4253, text: "Keep enough USDC in your wallet so trades aren't skipped. Keep a small amount of Ethereum for gas fees." },
  { from: 4253, to: 4414, text: "And join our Telegram for real-time notifications on every signal and trade closure." },
  { from: 4414, to: 4497, text: "And that's it — you're all set!" },
  { from: 4497, to: 4700, text: "Connect your wallet, approve USDC, enable auto-copy, and let the bot handle the rest." },
  { from: 4700, to: 4830, text: "Head over to smarttradingclub.io to get started." },
  { from: 4830, to: 4940, text: "See you on the next trade!" },
];

// Load audio
async function loadAudio() {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const resp = await fetch('/voiceover/tutorial-voiceover.mp3');
  const buf = await resp.arrayBuffer();
  audioBuffer = await audioCtx.decodeAudioData(buf);
  drawWaveform();
  updateTimeline();
}

function drawWaveform() {
  const canvas = document.getElementById('waveformCanvas');
  const totalFrames = Math.ceil(audioBuffer.duration * FPS) + AUDIO_START_FRAME;
  canvas.width = totalFrames * pixelsPerFrame;
  canvas.height = 60;
  const ctx = canvas.getContext('2d');

  const data = audioBuffer.getChannelData(0);
  const samplesPerFrame = Math.floor(audioBuffer.sampleRate / FPS);

  ctx.fillStyle = '#111318';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (let f = 0; f < totalFrames; f++) {
    const sampleStart = Math.max(0, (f - AUDIO_START_FRAME)) * samplesPerFrame;
    let max = 0;
    for (let s = sampleStart; s < Math.min(sampleStart + samplesPerFrame, data.length); s++) {
      max = Math.max(max, Math.abs(data[s]));
    }
    const h = max * 50;
    const x = f * pixelsPerFrame;
    ctx.fillStyle = f < AUDIO_START_FRAME ? '#1a1c24' : 'rgba(212,168,67,0.4)';
    ctx.fillRect(x, 30 - h / 2, Math.max(1, pixelsPerFrame - 1), h);
  }
}

function updateTimeline() {
  const totalFrames = Math.ceil(audioBuffer.duration * FPS) + AUDIO_START_FRAME + 100;
  const totalWidth = totalFrames * pixelsPerFrame;

  // Ruler
  const ruler = document.getElementById('ruler');
  ruler.innerHTML = '';
  ruler.style.width = totalWidth + 'px';
  for (let s = 0; s <= totalFrames / FPS; s++) {
    const x = s * FPS * pixelsPerFrame;
    const min = Math.floor(s / 60);
    const sec = s % 60;
    ruler.innerHTML += `<span style="left:${x}px">${min}:${String(sec).padStart(2,'0')}</span>`;
    ruler.innerHTML += `<div class="tick" style="left:${x}px"></div>`;
  }

  // Waveform area width
  document.getElementById('waveformArea').style.width = totalWidth + 'px';

  // Subtitle tracks
  const tracks = document.getElementById('subtitleTracks');
  tracks.innerHTML = '';
  const track = document.createElement('div');
  track.className = 'subtitle-track';
  track.style.width = totalWidth + 'px';

  subtitles.forEach((sub, i) => {
    const block = document.createElement('div');
    block.className = 'subtitle-block';
    block.style.left = (sub.from * pixelsPerFrame) + 'px';
    block.style.width = ((sub.to - sub.from) * pixelsPerFrame) + 'px';
    block.textContent = sub.text;
    block.dataset.index = i;
    block.title = sub.text;

    // Drag to move
    block.addEventListener('mousedown', (e) => {
      if (e.target.classList.contains('resize-handle')) return;
      startDrag(e, i);
    });

    // Resize handles
    const leftH = document.createElement('div');
    leftH.className = 'resize-handle left';
    leftH.addEventListener('mousedown', (e) => { e.stopPropagation(); startResize(e, i, 'left'); });

    const rightH = document.createElement('div');
    rightH.className = 'resize-handle right';
    rightH.addEventListener('mousedown', (e) => { e.stopPropagation(); startResize(e, i, 'right'); });

    block.appendChild(leftH);
    block.appendChild(rightH);
    track.appendChild(block);
  });

  tracks.appendChild(track);
  updateExport();
}

// Drag subtitle block
function startDrag(e, idx) {
  const startX = e.clientX;
  const startFrom = subtitles[idx].from;
  const dur = subtitles[idx].to - subtitles[idx].from;
  const block = e.target.closest('.subtitle-block');
  block.classList.add('dragging');

  function onMove(e) {
    const dx = e.clientX - startX;
    const dFrames = Math.round(dx / pixelsPerFrame);
    subtitles[idx].from = Math.max(0, startFrom + dFrames);
    subtitles[idx].to = subtitles[idx].from + dur;
    block.style.left = (subtitles[idx].from * pixelsPerFrame) + 'px';
    updateExport();
  }
  function onUp() {
    block.classList.remove('dragging');
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Resize subtitle block
function startResize(e, idx, side) {
  const startX = e.clientX;
  const startFrom = subtitles[idx].from;
  const startTo = subtitles[idx].to;
  const block = document.querySelectorAll('.subtitle-block')[idx];

  function onMove(e) {
    const dx = e.clientX - startX;
    const dFrames = Math.round(dx / pixelsPerFrame);
    if (side === 'left') {
      subtitles[idx].from = Math.min(startTo - 5, Math.max(0, startFrom + dFrames));
    } else {
      subtitles[idx].to = Math.max(startFrom + 5, startTo + dFrames);
    }
    block.style.left = (subtitles[idx].from * pixelsPerFrame) + 'px';
    block.style.width = ((subtitles[idx].to - subtitles[idx].from) * pixelsPerFrame) + 'px';
    updateExport();
  }
  function onUp() {
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('mouseup', onUp);
  }
  document.addEventListener('mousemove', onMove);
  document.addEventListener('mouseup', onUp);
}

// Click waveform to seek
document.getElementById('waveformArea').addEventListener('click', (e) => {
  const rect = e.currentTarget.getBoundingClientRect();
  const x = e.clientX - rect.left + e.currentTarget.parentElement.scrollLeft;
  currentFrame = Math.round(x / pixelsPerFrame);
  updatePlayhead();
  if (isPlaying) { stopPlay(); startPlay(); }
});

// Play/pause
function togglePlay() {
  if (isPlaying) stopPlay(); else startPlay();
}

function startPlay() {
  isPlaying = true;
  document.getElementById('playBtn').classList.add('active');
  document.getElementById('playBtn').innerHTML = '&#9646;&#9646; Pause';

  sourceNode = audioCtx.createBufferSource();
  sourceNode.buffer = audioBuffer;
  sourceNode.connect(audioCtx.destination);

  const audioTime = Math.max(0, (currentFrame - AUDIO_START_FRAME) / FPS);
  sourceNode.start(0, audioTime);
  playStartTime = audioCtx.currentTime;
  playStartFrame = currentFrame;

  function tick() {
    if (!isPlaying) return;
    const elapsed = audioCtx.currentTime - playStartTime;
    currentFrame = playStartFrame + Math.round(elapsed * FPS);
    updatePlayhead();
    updatePreviewSubtitle();
    animationId = requestAnimationFrame(tick);
  }
  tick();
}

function stopPlay() {
  isPlaying = false;
  document.getElementById('playBtn').classList.remove('active');
  document.getElementById('playBtn').innerHTML = '&#9654; Play';
  if (sourceNode) { try { sourceNode.stop(); } catch {} }
  cancelAnimationFrame(animationId);
}

function updatePlayhead() {
  const x = currentFrame * pixelsPerFrame;
  document.getElementById('playhead').style.left = x + 'px';

  const sec = currentFrame / FPS;
  const min = Math.floor(sec / 60);
  const s = (sec % 60).toFixed(3);
  document.getElementById('timeDisplay').textContent = `${min}:${s.padStart(6, '0')}`;
  document.getElementById('frameDisplay').textContent = `Frame: ${currentFrame}`;

  // Auto-scroll
  const container = document.getElementById('timelineContainer');
  const visible = container.clientWidth;
  if (x > container.scrollLeft + visible - 100) {
    container.scrollLeft = x - 200;
  }
}

function updatePreviewSubtitle() {
  const el = document.getElementById('previewSubtitle');
  const active = subtitles.find(s => currentFrame >= s.from && currentFrame < s.to);
  if (active) {
    el.textContent = active.text;
    el.style.opacity = '1';
  } else {
    el.style.opacity = '0';
  }
}

// Zoom
function zoomIn() { pixelsPerFrame = Math.min(12, pixelsPerFrame + 0.5); onZoom(); }
function zoomOut() { pixelsPerFrame = Math.max(0.5, pixelsPerFrame - 0.5); onZoom(); }
function onZoom() {
  document.getElementById('zoomLabel').textContent = Math.round(pixelsPerFrame / 3 * 100) + '%';
  drawWaveform();
  updateTimeline();
  updatePlayhead();
}

// Export
function saveToStorage() {
  localStorage.setItem('subtitleData', JSON.stringify(subtitles));
}

function loadFromStorage() {
  const saved = localStorage.getItem('subtitleData');
  if (saved) {
    try {
      subtitles = JSON.parse(saved);
      console.log('Loaded saved subtitles from localStorage');
    } catch {}
  }
}

function updateExport() {
  const code = 'const subtitleData = [\n' +
    subtitles.map(s => `  { from: ${s.from}, to: ${s.to}, text: ${JSON.stringify(s.text)} },`).join('\n') +
    '\n];';
  document.getElementById('exportCode').value = code;
  saveToStorage();
}

function copyExport() {
  const el = document.getElementById('exportCode');
  el.select();
  document.execCommand('copy');
  const btn = document.querySelector('.export-panel button');
  btn.textContent = 'Copied!';
  setTimeout(() => btn.textContent = 'Copy Code', 1500);
}

// Keyboard shortcuts
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); togglePlay(); }
  if (e.code === 'ArrowLeft') { currentFrame = Math.max(0, currentFrame - 1); updatePlayhead(); updatePreviewSubtitle(); }
  if (e.code === 'ArrowRight') { currentFrame++; updatePlayhead(); updatePreviewSubtitle(); }
});

function resetSubs() {
  if (confirm('Reset alle subtitles naar origineel?')) {
    localStorage.removeItem('subtitleData');
    location.reload();
  }
}

// Init — load saved data first, then audio
loadFromStorage();
loadAudio();
</script>
</body>
</html>
