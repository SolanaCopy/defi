<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Gold gradients -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A3"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="65%" stop-color="#B8912A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldInner" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A3" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#8B6914" stop-opacity="0.05"/>
    </linearGradient>
    <linearGradient id="goldBar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A3"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#9A7520"/>
    </linearGradient>
    <linearGradient id="goldBar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFE8A0"/>
      <stop offset="50%" stop-color="#E0B84C"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </linearGradient>
    <linearGradient id="goldBar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF0C0"/>
      <stop offset="40%" stop-color="#F0D060"/>
      <stop offset="100%" stop-color="#C89E30"/>
    </linearGradient>
    <linearGradient id="goldArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C89E30"/>
      <stop offset="50%" stop-color="#E8C84C"/>
      <stop offset="100%" stop-color="#FFF0C0"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFF5D0" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </linearGradient>

    <!-- Outer glow -->
    <filter id="outerGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <!-- Subtle glow for arrow -->
    <filter id="arrowGlow" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Bar shadow -->
    <filter id="barShadow">
      <feDropShadow dx="1" dy="2" stdDeviation="1.5" flood-color="#000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Hexagon background fill (dark) -->
  <polygon points="100,16 174,48 174,152 100,184 26,152 26,48"
    fill="#0D0D0D"/>

  <!-- Inner hex subtle gold fill -->
  <polygon points="100,16 174,48 174,152 100,184 26,152 26,48"
    fill="url(#goldInner)"/>

  <!-- Double hexagon border for depth -->
  <g filter="url(#outerGlow)">
    <!-- Outer hex -->
    <polygon points="100,12 178,46 178,154 100,188 22,154 22,46"
      fill="none" stroke="url(#gold)" stroke-width="5" stroke-linejoin="round"/>
    <!-- Inner hex (thinner, slightly inset) -->
    <polygon points="100,22 168,52 168,148 100,178 32,148 32,52"
      fill="none" stroke="url(#gold)" stroke-width="1.5" stroke-linejoin="round" stroke-opacity="0.4"/>
  </g>

  <!-- Bar chart (3 bars, ascending, with shadows) -->
  <g filter="url(#barShadow)">
    <rect x="58" y="122" width="20" height="40" rx="3" fill="url(#goldBar1)"/>
    <rect x="86" y="96" width="20" height="66" rx="3" fill="url(#goldBar2)"/>
    <rect x="114" y="68" width="20" height="94" rx="3" fill="url(#goldBar3)"/>
  </g>

  <!-- Bar shine overlay -->
  <rect x="58" y="122" width="8" height="40" rx="3" fill="url(#goldShine)"/>
  <rect x="86" y="96" width="8" height="66" rx="3" fill="url(#goldShine)"/>
  <rect x="114" y="68" width="8" height="94" rx="3" fill="url(#goldShine)"/>

  <!-- Upward trend line + arrow -->
  <g filter="url(#arrowGlow)">
    <polyline points="50,130 78,95 104,108 146,54"
      fill="none" stroke="url(#goldArrow)" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head (larger, sharper) -->
    <polygon points="148,48 132,56 142,68" fill="#FFF0C0" stroke="#E8C84C" stroke-width="0.5"/>
  </g>

  <!-- Small sparkle at arrow tip -->
  <circle cx="148" cy="48" r="3" fill="#FFF5D0" opacity="0.7">
    <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
  </circle>
</svg>
