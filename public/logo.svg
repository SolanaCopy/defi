<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F7E5A0"/>
      <stop offset="50%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#A07C30"/>
    </linearGradient>
    <linearGradient id="goldLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFF1C9"/>
      <stop offset="100%" stop-color="#D4A843"/>
    </linearGradient>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#141620"/>
      <stop offset="100%" stop-color="#0a0b10"/>
    </linearGradient>
  </defs>

  <!-- Background circle -->
  <circle cx="100" cy="100" r="96" fill="url(#bg)" stroke="url(#gold)" stroke-width="2.5" opacity="0.9"/>

  <!-- Inner ring -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#D4A843" stroke-width="0.8" opacity="0.2"/>

  <!-- Bold G lettermark -->
  <path d="M118,72 A42,42 0 1,0 118,128 L118,104 L100,104"
    fill="none" stroke="url(#goldLight)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round"/>
</svg>
