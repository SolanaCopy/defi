<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A3"/>
      <stop offset="35%" stop-color="#D4A843"/>
      <stop offset="65%" stop-color="#B8912A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldBar" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#F0D078"/>
      <stop offset="100%" stop-color="#B8912A"/>
    </linearGradient>
    <linearGradient id="goldArrow" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843"/>
      <stop offset="100%" stop-color="#F5E6A3"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hexagon outline -->
  <g filter="url(#glow)">
    <polygon points="100,12 178,46 178,154 100,188 22,154 22,46"
      fill="none" stroke="url(#gold)" stroke-width="8" stroke-linejoin="round"/>
  </g>

  <!-- Bar chart (3 bars, ascending) -->
  <rect x="62" y="120" width="18" height="38" rx="3" fill="url(#goldBar)"/>
  <rect x="88" y="100" width="18" height="58" rx="3" fill="url(#goldBar)"/>
  <rect x="114" y="78" width="18" height="80" rx="3" fill="url(#goldBar)"/>

  <!-- Upward trend arrow -->
  <g filter="url(#glow)">
    <polyline points="56,115 88,85 110,100 148,52"
      fill="none" stroke="url(#goldArrow)" stroke-width="7" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Arrow head -->
    <polygon points="148,52 134,54 146,66" fill="#F5E6A3"/>
  </g>
</svg>
