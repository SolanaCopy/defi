<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#F5E6A3"/>
      <stop offset="30%" stop-color="#D4A843"/>
      <stop offset="70%" stop-color="#B8912A"/>
      <stop offset="100%" stop-color="#8B6914"/>
    </linearGradient>
    <linearGradient id="goldShine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#D4A843" stop-opacity="0"/>
      <stop offset="50%" stop-color="#F5E6A3" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#D4A843" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f1018"/>
      <stop offset="100%" stop-color="#080a10"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="4" y="4" width="192" height="192" rx="40" fill="url(#bgGrad)"/>
  <rect x="4" y="4" width="192" height="192" rx="40" fill="none" stroke="url(#gold)" stroke-width="1.5" opacity="0.25"/>

  <!-- Rising chart bars (subtle, behind main mark) -->
  <g opacity="0.12">
    <rect x="30" y="140" width="12" height="20" rx="2" fill="url(#gold)"/>
    <rect x="48" y="128" width="12" height="32" rx="2" fill="url(#gold)"/>
    <rect x="66" y="118" width="12" height="42" rx="2" fill="url(#gold)"/>
    <rect x="84" y="105" width="12" height="55" rx="2" fill="url(#gold)"/>
  </g>

  <!-- Main mark: stylized golden diamond/shield shape -->
  <g filter="url(#glow)">
    <!-- Outer diamond frame -->
    <path d="M100,28 L162,80 L140,168 L60,168 L38,80 Z"
      fill="none" stroke="url(#gold)" stroke-width="3" stroke-linejoin="round"/>

    <!-- Inner upward arrow / trend -->
    <path d="M78,120 L100,58 L122,120"
      fill="none" stroke="url(#gold)" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Horizontal crossbar -->
    <line x1="85" y1="100" x2="115" y2="100"
      stroke="url(#gold)" stroke-width="4" stroke-linecap="round"/>

    <!-- Small peak accent -->
    <path d="M100,58 L100,45"
      stroke="#F5E6A3" stroke-width="4" stroke-linecap="round"/>
    <circle cx="100" cy="42" r="3" fill="#F5E6A3"/>
  </g>

  <!-- Shine effect -->
  <rect x="60" y="28" width="80" height="140" rx="8" fill="url(#goldShine)" opacity="0.15"/>

  <!-- Bottom text accent line -->
  <line x1="65" y1="152" x2="135" y2="152" stroke="url(#gold)" stroke-width="1.5" stroke-linecap="round" opacity="0.4"/>
</svg>
